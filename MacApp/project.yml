name: LocalAgent
options:
  bundleIdPrefix: com.localagent
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
packages:
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui
    from: 2.4.0
targets:
  LocalAgent:
    type: application
    platform: macOS
    sources:
      - path: LocalAgent
        excludes:
          - "**/*.entitlements"
    dependencies:
      - package: MarkdownUI
        product: MarkdownUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.localagent.app
        PRODUCT_NAME: Seyeon
        INFOPLIST_FILE: LocalAgent/Info.plist
        GENERATE_INFOPLIST_FILE: false
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: LocalAgent/LocalAgent.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: true
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: false
        COMBINE_HIDPI_IMAGES: true
    scheme:
      testTargets: []
